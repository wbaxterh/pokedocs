name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      # Before the site build: mermaid renders at build time via chromium (F1.3)
      - run: pnpm --filter docs-site exec playwright install --with-deps chromium
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      - run: pnpm --filter docs-site build
      - run: pnpm --filter docs-site e2e
